# FrontX CLI Template Assembly Manifest
# This file drives the template assembly process in copy-templates.ts
# Version: 1.0.0

version: "1.0.0"
description: "FrontX project scaffold templates"

# Stage 1a: Project scaffold files (static templates within CLI package)
project:
  source: ./project/
  description: "Project configuration files for standalone FrontX projects"
  contents:
    - configs/             # ESLint, depcruise, pre-commit configs (flattened to root)
    - eslint-plugin-local/ # Local ESLint plugin with FrontX rules
    - scripts/             # Utility scripts (test-architecture, check-mcp)
    - .npmrc               # NPM configuration
    - .nvmrc               # Node version
    - README.md            # Project README template

# Stage 1a: Layout scaffold templates (shadcn)
layout:
  source: ../../src/app/layout/
  description: "Layout component templates using shadcn/ui (from monorepo source)"
  destination: src/app/layout/
  files:
    - Layout.tsx
    - Header.tsx
    - Footer.tsx
    - Menu.tsx
    - Sidebar.tsx
    - Screen.tsx
    - Popup.tsx
    - Overlay.tsx
    - index.ts

# Stage 1b: Root project files (from monorepo root, dual-purpose)
# NOTE: Files that differ between monorepo and standalone have standalone versions
# in template-sources/project/ and are applied in Stage 1b-override.
root:
  description: "Files copied from monorepo root that serve both dev and template purposes"
  files:
    - index.html
    - tailwind.config.ts
    - tsconfig.node.json
    - .gitignore
    - src/vite-env.d.ts
    # main.tsx/App.tsx copied from monorepo, then overridden by standalone versions
    # (Stage 1b-override replaces MFE-specific code with standalone-compatible code)
    - src/app/main.tsx
    - src/app/App.tsx
    - src/app/initApp.ts
    - src/app/globals.css
    - scripts/generate-mfe-manifests.ts  # Single generator — same script powers host + scaffold
    # public/generated-mfe-manifests.json is shipped as an empty `[]` placeholder
    # by copy-templates.ts directly (not pulled from monorepo content), so a fresh
    # scaffold's bootstrap fetch succeeds before its first `npm run generate:mfe-manifests`
    # Standalone-only files (in template-sources/project/ instead of monorepo root):
    # - vite.config.ts -> configs/vite.config.ts (no federation plugin)
    # - postcss.config.js -> configs/postcss.config.js
    # - src/app/initApp.ts -> shared app init (monorepo inlines this in main.tsx)
    # - src/app/main.no-uikit.tsx -> src/app/ (no MFE imports)
    # - src/app/main.custom-uikit.tsx -> src/app/ (custom uikit variant)
    # - src/app/App.no-studio.tsx, App.no-uikit.tsx, App.no-uikit.no-studio.tsx -> src/app/
    # - src/app/App.custom-uikit.tsx, App.custom-uikit.no-studio.tsx -> src/app/
  directories:
    - src/__test-utils__   # Shared test helpers used by host and MFE tests
    - src/app/themes      # Theme definitions (default, dark, light)
    - src/app/icons       # Icon definitions
    - src/app/api         # API services (AccountsApiService)
    - src/app/components  # Reusable components (TextLoader)
    - src/app/lib         # Utility functions (cn)
    - src/app/mfe         # Shared MFE runtime (bootstrap + MfeScreenContainer copied verbatim from monorepo — no override)
    - src/app/actions     # Bootstrap actions
    - src/app/effects     # Bootstrap effects
    - src/app/events      # Bootstrap events
  # MFE template is sourced from src/mfe_packages/_blank-mfe/ (see copy-templates.ts)
  # src/app/mfe ships verbatim from the monorepo — scaffolded projects run the
  # same fetch-based bootstrap the host runs; the runtime manifest endpoint is
  # served from public/generated-mfe-manifests.json (initially `[]`, regenerated
  # by `npm run generate:mfe-manifests`).

# Stage 1c: AI documentation overrides
ai_overrides:
  source: ./ai-overrides/
  description: "Simplified versions of AI docs for standalone projects"
  usage: "Files marked with @standalone:override in root .ai/ use these versions"
  contents:
    - GUIDELINES.md
    - targets/API.md
    - targets/THEMES.md

# Stage 2: Generated content (created by copy-templates.ts)
generated:
  description: "IDE configuration files generated during template assembly"
  files:
    - CLAUDE.md                 # Pointer to .ai/GUIDELINES.md
    - .claude/commands/*.md     # Command adapters
    - .cursor/rules/frontx.mdc    # Cursor rule pointer
    - .cursor/commands/*.md     # Command adapters
    - .windsurf/rules/frontx.md   # Windsurf rule pointer
    - .windsurf/workflows/*.md  # Workflow adapters

# Build output
output:
  directory: ../templates/
  description: "Generated templates directory (gitignored)"
